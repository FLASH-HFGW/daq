<style>

.mydiv {
cursor: pointer;
color:#0000FF;
}
.mydiv:link { color:#0000FF; text-decoration:none }
.mydiv:visited { color:#800080; text-decoration:none }
.mydiv:hover { color:#0000FF; text-decoration:underline }
.mydiv:active { color:#0000FF; text-decoration:underline }
.mydiv:focus { color:#0000FF; text-decoration:none; }

input[type=number] {
   font-size: 100%;
}

input[type=number][disabled]{color:transparent; background-color:transparent; border-width: 0px;}

.rack-switch-panel {
  --rack-led-c1: #2eb85c;
  --rack-led-c2: #ff9500;
  --rack-active-path: #1677ff;
  width: min(100%, 1000px);
  margin: 24px auto 0;
}
.rack-switch-panel svg { display:block; width:100%; height:auto; }
.rack-chassis { fill:#e8ebef; stroke:#777; stroke-width:2; }
.rack-ear, .rack-divider { fill:none; stroke:#777; stroke-width:2; }
.rack-screw { fill:#aaa; stroke:#555; stroke-width:1.5; }
.rack-connector-outer { fill:#b7bcc3; stroke:#292929; stroke-width:2; }
.rack-connector-inner { fill:#fafafa; stroke:#666; stroke-width:1.5; }
.rack-signal-path {
  fill:none; stroke:var(--rack-active-path); stroke-width:6;
  stroke-linecap:round; opacity:0; transition:opacity 120ms ease;
}
.rack-signal-path.active { opacity:1; }
.rack-led { fill:#8b8f94; stroke:#666; stroke-width:2; transition:fill 120ms ease; }
.rack-led.c1 { fill:var(--rack-led-c1); }
.rack-led.c2 { fill:var(--rack-led-c2); }
.rack-svg-label {
  fill:#202124; font-family:Arial,sans-serif; font-size:16px; font-weight:bold;
}
.rack-svg-small { fill:#555; font-family:Arial,sans-serif; font-size:14px; }
.rack-controls {
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-top:10px;
}
.rack-control { min-width:0; text-align:center; }
.rack-control strong { display:block; margin-bottom:4px; }
.rack-control .mbutton { padding:7px 14px; margin:3px; font-size:16px; }
.rack-control .mbutton.selected { box-shadow:inset 0 0 0 3px var(--rack-active-path); }
.rack-presets-title {
  width:fit-content;
  margin:22px auto 0;
  padding:7px 18px;
  border:1px solid #999;
  border-radius:6px;
  background:#e8ebef;
  color:#202124;
  text-align:center;
}
.rack-presets {
  display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-top:10px;
}
.rack-preset { min-width:0; text-align:center; }
.rack-preset strong { display:block; margin-bottom:7px; }
.rack-preset .mbutton { padding:8px 18px; font-size:16px; }
.rack-preset .mbutton.selected { box-shadow:inset 0 0 0 3px var(--rack-active-path); }
.rack-status { min-height:1.3em; margin-top:10px; color:#555; font-size:14px; }
.rack-status.error { color:#b00020; font-weight:bold; }
.rack-legend {
  display:flex; flex-wrap:wrap; gap:8px 18px; margin-top:8px; color:#555; font-size:14px;
}
.rack-legend-item { display:inline-flex; align-items:center; gap:6px; }
.rack-legend-dot { width:11px; height:11px; border:1px solid #777; border-radius:50%; }
.rack-legend-dot.c1 { background:var(--rack-led-c1); }
.rack-legend-dot.c2 { background:var(--rack-led-c2); }
@media (max-width:650px) {
  .rack-controls, .rack-presets { grid-template-columns:repeat(2,minmax(0,1fr)); }
}
@media (max-width:380px) {
  .rack-controls, .rack-presets { grid-template-columns:1fr; }
}
@media (prefers-reduced-motion:reduce) {
  .rack-signal-path, .rack-led { transition:none; }
}

</style>

<script>

window.onload = function() {

  mhttpd_init('Cryogenic Switch');
  mhistory_init();

}
  

function cr1_moveTo(id){

  var paths = ["/Equipment/CryoSwitch/Variables/CR1_set"];

  mjsonrpc_db_paste(paths,[id]).then(function(rpc) {
  }).catch(function(error) {
          mjsonrpc_error_alert(error);
  });

}


function cr2_moveTo(id){

  mjsonrpc_db_paste(paths,[id]).then(function(rpc) {
  }).catch(function(error) {

  });

}


function rt1_moveTo(id){

  var paths = ["/Equipment/CryoSwitch/Variables/RT1_set"];

  mjsonrpc_db_paste(paths,[id]).then(function(rpc) {
  }).catch(function(error) {
          mjsonrpc_error_alert(error);
  });

}


/* Browser equivalent of Calibration.py::Get_HTTP_Result(). */
function Get_HTTP_Result(CmdToSend) {

  var switchUrl = "http://192.168.2.113/:" + CmdToSend;

  return fetch(switchUrl, {
    method: "GET",
    mode: "no-cors",
    cache: "no-store"
  });

}


var rackSwitchStates = { A: null, B: null, C: null, D: null };

var rackPresetStates = {
  S11cav: { A: 0, B: 0, C: 0 },
  S22cav: { A: 1, B: 0, C: 1 },
  S21cav: { A: 0, B: 0, C: 1 },
  S12cav: { A: 0, B: 1, C: 0 }
};


function setRackControlsDisabled(disabled) {

  document.querySelectorAll(".rack-control button, .rack-preset button").forEach(function(button) {
    button.disabled = disabled;
  });

}


function rack_moveTo(switchLabel, port) {

  var command = "SET" + switchLabel + "=" + port;
  var status = document.getElementById("rack_command_status");

  setRackControlsDisabled(true);
  status.classList.remove("error");
  status.textContent = "Invio " + command + "...";

  Get_HTTP_Result(command).then(function() {
    setRackSwitchState(switchLabel, port);
    status.textContent = command + " inviato al cassetto.";
  }).catch(function(error) {
    status.classList.add("error");
    status.textContent = "Nessuna risposta dal cassetto: controllare IP e collegamenti.";
    console.error(error);
  }).finally(function() {
    setRackControlsDisabled(false);
  });

}


function rack_switchPreset(presetName) {

  var preset = rackPresetStates[presetName];
  var switchLabels = Object.keys(preset);
  var status = document.getElementById("rack_command_status");
  var commandSequence = Promise.resolve();

  setRackControlsDisabled(true);
  status.classList.remove("error");
  status.textContent = "Impostazione " + presetName + "...";

  switchLabels.forEach(function(switchLabel) {
    commandSequence = commandSequence.then(function() {
      return Get_HTTP_Result("SET" + switchLabel + "=" + preset[switchLabel]);
    });
  });

  commandSequence.then(function() {
    switchLabels.forEach(function(switchLabel) {
      setRackSwitchState(switchLabel, preset[switchLabel]);
    });
    status.textContent = "Combinazione " + presetName + " impostata.";
  }).catch(function(error) {
    status.classList.add("error");
    status.textContent = "Impossibile impostare " + presetName + ": controllare IP e collegamenti.";
    console.error(error);
  }).finally(function() {
    setRackControlsDisabled(false);
  });

}


function setRackSwitchState(switchLabel, port) {

  var led = document.querySelector('.rack-led[data-switch="' + switchLabel + '"]');
  var paths = document.querySelectorAll('.rack-signal-path[data-switch="' + switchLabel + '"]');
  var buttons = document.querySelectorAll('.rack-control[data-switch="' + switchLabel + '"] button');

  rackSwitchStates[switchLabel] = port;

  led.classList.remove("c1", "c2");
  led.classList.add(port === 0 ? "c1" : "c2");

  paths.forEach(function(path) {
    path.classList.toggle("active", Number(path.dataset.port) === port);
  });

  buttons.forEach(function(button) {
    var selected = Number(button.dataset.port) === port;
    button.classList.toggle("selected", selected);
    button.setAttribute("aria-pressed", selected ? "true" : "false");
  });

  updateRackPresetSelection();

}


function updateRackPresetSelection() {

  document.querySelectorAll(".rack-preset button").forEach(function(button) {
    var preset = rackPresetStates[button.dataset.preset];
    var selected = Object.keys(preset).every(function(switchLabel) {
      return rackSwitchStates[switchLabel] === preset[switchLabel];
    });

    button.classList.toggle("selected", selected);
    button.setAttribute("aria-pressed", selected ? "true" : "false");
  });

}

</script>
